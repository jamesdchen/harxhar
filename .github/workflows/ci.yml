name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  notebook-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # `make export` template-exports converted (@register_run) executors via
      # hpc_agent and normalizes the output with ruff.
      - run: pip install ruff "hpc-agent @ git+https://github.com/jamesdchen/hpc-agent.git@d141f84"
      - name: Re-export every notebook
        run: make export
      - name: Fail if any exported .py drifted from its notebook
        run: |
          if ! git diff --exit-code -- src/ scripts/; then
            echo "::error::Exported .py files drifted from notebooks/. Run 'make export' locally and commit the result."
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install mypy
      - run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: pytest -m "not slow and not gpu" --tb=short -q

  audit:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: make repro-fixture
      - run: python scripts/audit_check.py --quick
      # validate_strategy_eval.py was removed in 7f8f9a45 (Apr 2026 restructure);
      # its checks live in core/tests/test_strategy_eval.py now, which the test
      # job already runs.
