[project]
name = "harxhar-ml"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "harxhar-core>=0.1.0",
    "scikit-learn>=1.2,<2.0",
    "xgboost>=1.7,<3.0",
    "lightgbm>=3.3,<5.0",
    "statsmodels>=0.13,<1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.4",
    "mypy>=1.0",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["SIM108"]
