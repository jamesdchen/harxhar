# Example: Full subgroup analysis across models and feature types
name: full_subgroup_sweep
mode: subgroup_analysis
models: [ridge, xgboost]
features: [har, pca]
subgroups: [baseline, moments, liquidity, sentiment]
train_window: 500
n_components: 5
horizon: 1
