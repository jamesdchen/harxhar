name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# src/ is a generated build artifact (not committed). Every job that touches it
# builds it first via notebooks/_build_package.py — the convention-driven local
# stand-in for hpc-agent's `export-package` primitive. The old `notebook-sync`
# drift gate is gone: there is no committed copy to drift from, and a failed
# export now fails the build step directly.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff ./vendor/hpc_agent-0.3.0-py3-none-any.whl
      - name: Build the generated src/ package
        run: python notebooks/_build_package.py
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install mypy ruff ./vendor/hpc_agent-0.3.0-py3-none-any.whl
      - name: Build the generated src/ package
        run: python notebooks/_build_package.py
      - run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - name: Build the generated src/ package
        run: python notebooks/_build_package.py
      - run: pytest -m "not slow and not gpu" --tb=short -q

  fungibility:
    # Serial-elision gate: proves each chunk-fungible executor's chunked
    # walk-forward run equals its serial run (core/tests/test_fungibility.py).
    # The test is `slow` (real backtests, ~90s) so the `test` job skips it;
    # this job runs it explicitly. requirements.txt vendors hpc-agent as a
    # wheel, which the executors' inlined runtime needs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - name: Build the generated src/ package
        run: python notebooks/_build_package.py
      - run: pytest core/tests/test_fungibility.py -m slow --tb=short -q

  audit:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      # `make repro-fixture` -> `make repro`, which depends on `export` and
      # builds the src/ package before running.
      - run: make repro-fixture
      - run: python scripts/audit_check.py --quick
      # validate_strategy_eval.py was removed in 7f8f9a45 (Apr 2026 restructure);
      # its checks live in core/tests/test_strategy_eval.py now, which the test
      # job already runs.
