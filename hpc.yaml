# ML/DL backtesting pipelines for financial volatility forecasting.
# Executors live in colab/src/ — standalone modules with no core/projects dependencies.

project: harxhar
cluster: hoffman2
remote_path: /u/home/j/jamesdc1/project-cucuringu/harxhar

experiment_paths:
  - "projects/ml/experiments/*.yaml"
  - "projects/dl/experiments/*.yaml"

cluster_envs:
  hoffman2:
    ml: { modules: "python gcc", conda_env: null }
    dl: { modules: "conda cuda/12.3", conda_env: harxhar-dl }
  discovery:
    ml: { modules: "python", conda_env: null }
    dl: { modules: "", conda_env: project-cucuringu }

profiles:
  ml_ridge:
    run: "python3 colab/src/ml_ridge.py"
    chunking:
      total: 100
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: ml
    resources:
      cpus: 1
      mem: "16G"
      walltime: "4:00:00"
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"

  ml_xgboost:
    run: "python3 colab/src/ml_xgboost.py"
    chunking:
      total: 100
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: ml
    resources:
      cpus: 1
      mem: "16G"
      walltime: "4:00:00"
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"

  ml_lightgbm:
    run: "python3 colab/src/ml_lightgbm.py"
    chunking:
      total: 100
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: ml
    resources:
      cpus: 1
      mem: "16G"
      walltime: "4:00:00"
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"

  ml_pcr:
    run: "python3 colab/src/ml_pcr.py"
    chunking:
      total: 100
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: ml
    resources:
      cpus: 1
      mem: "16G"
      walltime: "4:00:00"
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"

  ml_baseline:
    run: "python3 colab/src/ml_baseline.py"
    chunking:
      total: 100
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: ml
    resources:
      cpus: 1
      mem: "8G"
      walltime: "1:00:00"
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"

  dl_patchts:
    run: "python3 colab/src/dl_patchts.py"
    chunking:
      total: 10
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: dl
    resources:
      cpus: 4
      mem: "16G"
      walltime: "6:00:00"
      gpus: 2
      gpu_type: a100
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"
    gpu_fallback: [a100, h200, a6000, h100, v100, rtx2080ti]
    max_retries: 3

  dl_ae_ridge:
    run: "python3 colab/src/dl_ae_ridge.py"
    chunking:
      total: 10
      chunk_arg: "--chunk-id"
      total_arg: "--total-chunks"
    env_group: dl
    resources:
      cpus: 4
      mem: "16G"
      walltime: "6:00:00"
      gpus: 2
      gpu_type: a100
    results:
      dir: "results/{run_id}"
      pattern: "results_chunk_*.csv"
    gpu_fallback: [a100, h200, a6000, h100, v100, rtx2080ti]
    max_retries: 3

rsync_exclude:
  - .git/
  - results/
  - results_scaling_laws/
  - __pycache__/
  - "*.pyc"
  - .mypy_cache/
  - all30min/
  - .claude/
