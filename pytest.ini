[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests requiring CUDA (deselect with '-m "not gpu"')
filterwarnings =
    ignore::FutureWarning
    ignore::DeprecationWarning:statsmodels
    ignore::UserWarning:lightgbm
