repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: notebook-export
        name: re-export notebooks to src/ + scripts/
        entry: scripts/_precommit_export.py
        language: python
        files: ^notebooks/(pipeline|executors|scripts)/.*\.ipynb$
        pass_filenames: true
